<div class="flex flex-col items-center justify-center gap-4 p-12 text-center min-h-[320px]">
  <div class="w-[72px] h-[72px] rounded-full bg-[var(--mis-danger-light)] flex items-center justify-center">
    <ng-icon name="lucideWifi" size="32" class="text-[var(--mis-danger)]" />
  </div>
  <h3 class="m-0 text-[22px] font-semibold text-[var(--mis-text-primary)]">Subsistema no disponible</h3>
  <p class="m-0 text-base text-[var(--mis-text-secondary)] max-w-[380px] leading-normal">
    <strong>{{ subsistema() }}</strong> no está accesible en este momento.
    @if (motivo()) {
      <span class="block mt-2 text-[13px] text-[var(--mis-text-tertiary)] font-mono">{{ motivo() }}</span>
    }
  </p>
  <button class="inline-flex items-center gap-2 px-4 py-2 rounded-[6px] border border-[var(--mis-primary)] bg-transparent text-[var(--mis-primary)] text-sm font-medium cursor-pointer transition-all duration-150 hover:bg-[var(--mis-primary-light)]" (click)="reintentar.emit()">
    <ng-icon name="lucideRefreshCw" size="14" />
    Reintentar conexión
  </button>
</div>
