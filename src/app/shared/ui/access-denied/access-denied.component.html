<div class="flex flex-col items-center justify-center gap-4 py-16 px-6 text-center">
  <div class="flex items-center justify-center w-14 h-14 rounded-full bg-[var(--mis-danger-light)]">
    <ng-icon name="lucideShieldAlert" size="28" class="text-[var(--mis-danger)]" />
  </div>
  <div class="flex flex-col gap-1 max-w-md">
    <h2 class="text-[17px] font-semibold text-[var(--mis-text-primary)]">Acceso denegado</h2>
    <p class="text-[13px] text-[var(--mis-text-secondary)]">{{ mensaje() }}</p>
  </div>
  <a
    routerLink="/admin/dashboard"
    class="inline-flex items-center gap-2 px-4 py-2 rounded-[10px] bg-[var(--mis-primary)] text-[var(--mis-text-on-primary)] text-[13px] font-medium no-underline transition-colors duration-150 hover:bg-[var(--mis-primary-hover)]"
  >
    <ng-icon name="lucideArrowLeft" size="14" />
    Volver a Mi espacio
  </a>
</div>
