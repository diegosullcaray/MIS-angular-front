# Nginx del SISTEMA HIJO (frontend Remote).
#
# ⚠️ CORS obligatorio (guía 08 §7): el Host carga remoteEntry.json y los
# chunks desde SU dominio, por lo que este servidor debe permitirlo.
# En producción reemplazar * por el dominio real del Host
# (p. ej. https://mis.confianza.pe).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # CORS hacia el dominio del Host (ajustar en producción)
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    # remoteEntry.json y metadatos de federación: nunca cachear
    location ~* remoteEntry\.json$ {
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Assets con hash: caché larga
    location ~* \.(js|css|png|svg|woff2?)$ {
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback (solo para el modo standalone del remote)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
